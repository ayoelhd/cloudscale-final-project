apiVersion: v1
kind: Service
metadata:
  name: cloudscale-service
  labels:
    app: cloudscale-app
spec:
  type: LoadBalancer       # Azure provisions a public IP automatically
  selector:
    app: cloudscale-app    # routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80             # external port (what the browser hits)
      targetPort: 3000     # internal port (what the container listens on)
